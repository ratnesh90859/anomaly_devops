global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'anomaly-detection'

# Load alert rules
rule_files:
  - "alerts.yml"

# Alertmanager config (optional, routes alerts if alertmanager is added later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the Node.js app
  - job_name: 'anomaly-app'
    scrape_interval: 10s
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'
